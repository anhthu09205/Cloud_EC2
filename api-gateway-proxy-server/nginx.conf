events {}
http {
    # Bước 1: Định nghĩa nhóm Web Server để cân bằng tải
    upstream my_web_cluster {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://application-backend-server:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===== STUDENT JSON =====
        location /api/student {
            proxy_pass http://application-backend-server:8081/student;
            charset utf-8;
        }

        # ===== STUDENT HTML =====
        location = /student {
            return 301 /student/;
        }

        location /student/ {
            proxy_pass http://application-backend-server:8081/student;
        }

        location /student-view/ {
            proxy_pass http://application-backend-server:8081/student/view;
        }

        # ===== DB JSON =====
        location /api/students-db {
            proxy_pass http://application-backend-server:8081/students-db;
        }

        # ===== DB HTML =====
        location /students-db/ {
            proxy_pass http://application-backend-server:8081/students-db/view;
        }

        # location = /auth/ {
        #     return 302 /realms/master/account/; 
        # }

        location /auth/ { 
            proxy_pass http://authentication-identity-server:8080/; 
            proxy_set_header Host $host; 
            proxy_set_header X-Real-IP $remote_addr; 
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
            proxy_set_header X-Forwarded-Proto $scheme; 
        } 

        location /admin/ {
            proxy_pass http://authentication-identity-server:8080/admin/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Ưu tiên 3: Keycloak Auth (Mục cơ bản 4)
        location /realms/ {
            proxy_pass http://authentication-identity-server:8080/realms/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /resources/ {
            proxy_pass http://authentication-identity-server:8080/resources/;
        }

        location /js/ {
            proxy_pass http://authentication-identity-server:8080/js/;
          }

        location /account/ {
            proxy_pass http://authentication-identity-server:8080/account/;
        }

          # Ưu tiên 4: Web Frontend & Blog (Mục mở rộng 10 - Load Balancing)
        location /lb/ {
            proxy_pass http://my_web_cluster/;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header Vary "*";
            proxy_set_header Cache-Control "no-cache";
          }
        

        location / {
            proxy_pass http://web-frontend-server;
        }
    }
}